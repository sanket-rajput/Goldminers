<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BluCare+ — Nearby Ambulances</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      const t = localStorage.getItem('blucare_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── Header ───────────────────────────────────── */
    .page-header {
      width: 100%;
      max-width: 800px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1rem;
      border-bottom: 1px solid #1e293b;
    }
    .page-header h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #f87171, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-header .back-btn {
      padding: 0.5rem 1rem;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin-left: auto;
    }
    .page-header .back-btn:hover { border-color: #38bdf8; color: #e2e8f0; }

    /* ─── Content ──────────────────────────────────── */
    .content {
      width: 100%;
      max-width: 800px;
      padding: 1rem;
      flex: 1;
    }

    /* ─── Status banner ────────────────────────────── */
    .status-banner {
      text-align: center;
      padding: 2rem 1rem;
      color: #94a3b8;
    }
    .status-banner .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid #334155;
      border-top-color: #ef4444;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.8rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-banner .location-info {
      font-size: 0.82rem;
      color: #64748b;
      margin-top: 0.5rem;
    }

    /* ─── Error banner ─────────────────────────────── */
    .error-banner {
      text-align: center;
      padding: 2rem 1rem;
      color: #f87171;
    }
    .error-banner p { margin-bottom: 1rem; }
    .retry-btn {
      padding: 0.6rem 1.5rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.9; }

    /* ─── Ambulance cards ──────────────────────────── */
    .ambulance-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .ambulance-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s;
    }
    .ambulance-card:hover { border-color: #ef4444; transform: translateY(-1px); }

    .amb-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #7f1d1d;
      color: #fca5a5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .amb-info { flex: 1; min-width: 0; }
    .amb-name {
      font-weight: 600;
      color: #e2e8f0;
      font-size: 0.95rem;
    }
    .amb-meta {
      font-size: 0.82rem;
      color: #64748b;
      margin-top: 0.25rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .amb-distance {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 8px;
      background: #7f1d1d;
      color: #fca5a5;
      font-weight: 600;
      flex-shrink: 0;
      align-self: center;
    }
    .amb-phone a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }
    .amb-phone a:hover { text-decoration: underline; }

    /* ─── Directions link ──────────────────────────── */
    .directions-link {
      display: inline-block;
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: #4ade80;
      text-decoration: none;
    }
    .directions-link:hover { text-decoration: underline; }

    /* ─── Result count ─────────────────────────────── */
    .result-count {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 1rem;
    }

    /* ─── Emergency banner ─────────────────────────── */
    .emergency-banner {
      background: linear-gradient(135deg, #7f1d1d, #991b1b);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    .emergency-banner p {
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .emergency-banner strong { color: #fca5a5; }
    .emergency-number {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-top: 0.3rem;
    }
  </style>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="page-header">
    <h1>🚑 Nearby Ambulances</h1>
    <a class="back-btn" href="/">Back to Chat</a>
  </div>

  <div class="content" id="content">
    <!-- Initial: getting location -->
    <div class="status-banner" id="status-loading">
      <div class="spinner"></div>
      <div>Getting your location…</div>
      <div class="location-info" id="location-info"></div>
    </div>

    <!-- Error state -->
    <div class="error-banner" id="status-error" style="display:none;">
      <p id="error-message">Something went wrong.</p>
      <button class="retry-btn" onclick="startSearch()">🔄 Retry</button>
    </div>

    <!-- Results -->
    <div id="results" style="display:none;">
      <div class="emergency-banner">
        <p>⚠️ In a <strong>life-threatening emergency</strong>, always call your local emergency number first.</p>
        <div class="emergency-number">📞 112 / 108 / 102</div>
      </div>

      <div class="result-count" id="result-count"></div>
      <div class="ambulance-list" id="ambulance-list"></div>
    </div>
  </div>

<script>
  const API = window.location.origin;

  function startSearch() {
    document.getElementById('status-loading').style.display = '';
    document.getElementById('status-error').style.display = 'none';
    document.getElementById('results').style.display = 'none';

    if (!navigator.geolocation) {
      showError('Geolocation is not supported by your browser.');
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        document.getElementById('location-info').textContent =
          `📍 Location: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
        fetchAmbulances(lat, lon);
      },
      (err) => {
        let msg = 'Could not get your location. ';
        switch (err.code) {
          case 1: msg += 'Please allow location access in your browser settings.'; break;
          case 2: msg += 'Location information is unavailable.'; break;
          case 3: msg += 'Location request timed out. Try again.'; break;
        }
        showError(msg);
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }

  async function fetchAmbulances(lat, lon) {
    document.getElementById('status-loading').querySelector('div:nth-child(2)').textContent =
      'Searching for nearby ambulances…';

    try {
      const resp = await fetch(`${API}/proxy/ambulance?lat=${lat}&lon=${lon}`, { timeout: 30000 });

      if (!resp.ok) {
        const detail = await resp.text();
        throw new Error(`Server error ${resp.status}: ${detail}`);
      }

      const data = await resp.json();
      renderResults(data, lat, lon);
    } catch (err) {
      console.error('Ambulance fetch error:', err);
      showError('Could not fetch ambulance data. Make sure the ambulance service is running. Error: ' + err.message);
    }
  }

  function renderResults(data, userLat, userLon) {
    document.getElementById('status-loading').style.display = 'none';
    document.getElementById('results').style.display = '';

    // The API may return an array directly or { results: [...] } or { ambulances: [...] }
    let ambulances = [];
    if (Array.isArray(data)) {
      ambulances = data;
    } else if (data.results && Array.isArray(data.results)) {
      ambulances = data.results;
    } else if (data.ambulances && Array.isArray(data.ambulances)) {
      ambulances = data.ambulances;
    } else if (data.data && Array.isArray(data.data)) {
      ambulances = data.data;
    } else {
      // Try to treat the whole object as a single result or show raw
      ambulances = [data];
    }

    const countEl = document.getElementById('result-count');
    countEl.textContent = `Found ${ambulances.length} ambulance service${ambulances.length !== 1 ? 's' : ''} near you`;

    const listEl = document.getElementById('ambulance-list');
    listEl.innerHTML = '';

    if (ambulances.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;padding:2rem;color:#64748b;">No ambulance services found nearby. Try expanding your search or call 112.</div>';
      return;
    }

    for (const amb of ambulances) {
      const name = amb.name || amb.title || amb.service_name || 'Ambulance Service';
      const phone = amb.phone || amb.contact || amb.phone_number || amb.tel || '';
      const address = amb.address || amb.location || amb.vicinity || '';
      const distance = amb.distance || amb.dist || '';
      const lat2 = amb.lat || amb.latitude || '';
      const lon2 = amb.lon || amb.longitude || amb.lng || '';

      const card = document.createElement('div');
      card.className = 'ambulance-card';

      let directionsLink = '';
      if (lat2 && lon2) {
        const mapsUrl = `https://www.google.com/maps/dir/${userLat},${userLon}/${lat2},${lon2}`;
        directionsLink = `<a class="directions-link" href="${mapsUrl}" target="_blank" rel="noopener">🗺️ Get Directions</a>`;
      } else if (address) {
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
        directionsLink = `<a class="directions-link" href="${mapsUrl}" target="_blank" rel="noopener">🗺️ Get Directions</a>`;
      }

      let phoneHtml = '';
      if (phone) {
        const cleanPhone = phone.replace(/[^\d+]/g, '');
        phoneHtml = `<span class="amb-phone">📞 <a href="tel:${cleanPhone}">${phone}</a></span>`;
      }

      let distHtml = '';
      if (distance) {
        const d = typeof distance === 'number' ? distance.toFixed(1) + ' km' : distance;
        distHtml = `<span class="amb-distance">${d}</span>`;
      }

      card.innerHTML = `
        <div class="amb-icon">🚑</div>
        <div class="amb-info">
          <div class="amb-name">${escapeHtml(name)}</div>
          <div class="amb-meta">
            ${address ? '<span>📍 ' + escapeHtml(address) + '</span>' : ''}
            ${phoneHtml}
          </div>
          ${directionsLink}
        </div>
        ${distHtml}
      `;

      listEl.appendChild(card);
    }
  }

  function showError(msg) {
    document.getElementById('status-loading').style.display = 'none';
    document.getElementById('status-error').style.display = '';
    document.getElementById('error-message').textContent = msg;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Auto-start on page load
  startSearch();
</script>

</body>
</html>
