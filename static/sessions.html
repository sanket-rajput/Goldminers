<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BluCare+ — My Sessions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      const t = localStorage.getItem('blucare_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── Header ───────────────────────────────────── */
    .page-header {
      width: 100%;
      max-width: 800px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1rem;
      border-bottom: 1px solid #1e293b;
    }
    .page-header h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-header .back-btn {
      padding: 0.5rem 1rem;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin-left: auto;
    }
    .page-header .back-btn:hover { border-color: #38bdf8; color: #e2e8f0; }

    /* ─── Content ──────────────────────────────────── */
    .content {
      width: 100%;
      max-width: 800px;
      padding: 1rem;
      flex: 1;
    }

    /* ─── Empty state ──────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: #64748b;
    }
    .empty-state h2 {
      font-size: 1.3rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .empty-state p { margin-bottom: 1.5rem; }
    .empty-state a {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .empty-state a:hover { opacity: 0.9; }

    /* ─── Loading ──────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }
    .loading .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.8rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Session cards (list view) ────────────────── */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .session-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .session-card:hover { border-color: #38bdf8; transform: translateY(-1px); }
    .session-card .sc-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .sc-icon.completed { background: #065f46; color: #86efac; }
    .sc-icon.active    { background: #713f12; color: #fbbf24; }
    .session-card .sc-info { flex: 1; min-width: 0; }
    .session-card .sc-title {
      font-weight: 600;
      color: #e2e8f0;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-card .sc-meta {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .session-card .sc-phase {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .sc-phase.completed { background: #14532d; color: #86efac; }
    .sc-phase.gathering { background: #713f12; color: #fbbf24; }
    .sc-phase.awaiting_choice { background: #4c1d95; color: #c4b5fd; }
    .sc-phase.greeting  { background: #065f46; color: #6ee7b7; }

    /* ─── Session detail (read-only chat) ──────────── */
    .session-detail {
      display: none;
    }
    .session-detail.active { display: block; }

    /* Keep detail area constrained and scrollable to avoid page jumps */
    .session-detail .read-only-messages {
      max-height: calc(100vh - 240px);
      overflow-y: auto;
      padding-right: 8px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 1rem;
    }
    .detail-back-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .detail-back-btn:hover { border-color: #38bdf8; color: #e2e8f0; }
    .detail-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .detail-date {
      font-size: 0.78rem;
      color: #64748b;
      margin-left: auto;
    }

    /* Read-only messages */
    .read-only-messages {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      padding-bottom: 2rem;
    }
    .ro-msg {
      max-width: 88%;
      padding: 0.75rem 1rem;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .ro-msg.bot {
      align-self: flex-start;
      background: #1e293b;
      border-bottom-left-radius: 4px;
      color: #cbd5e1;
    }
    .ro-msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .ro-msg strong { color: #38bdf8; }
    .ro-msg h1, .ro-msg h2, .ro-msg h3 {
      color: #38bdf8;
      margin: 0.4rem 0 0.2rem;
      font-size: 1rem;
    }
    .ro-msg hr { border: none; border-top: 1px solid #334155; margin: 0.6rem 0; }
    .ro-msg ul, .ro-msg ol { padding-left: 1.2rem; margin: 0.2rem 0; }
    .ro-msg code { background: #0f172a; padding: 2px 5px; border-radius: 4px; font-size: 0.86em; }

    .read-only-notice {
      text-align: center;
      color: #64748b;
      font-size: 0.8rem;
      padding: 1rem;
      border-top: 1px solid #1e293b;
    }

    /* ─── Animations ───────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .session-card, .ro-msg { animation: fadeIn 0.3s ease; }

    /* ─── Error ────────────────────────────────────── */
    .error-msg {
      text-align: center;
      padding: 2rem;
      color: #fca5a5;
      background: #1e293b;
      border: 1px solid #7f1d1d;
      border-radius: 14px;
    }
  </style>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="page-header">
    <h1>My Sessions</h1>
    <a class="back-btn ambulance-header-btn" href="/nearby-ambulance">Ambulance</a>
    <a class="back-btn" href="/">Back to Chat</a>
  </div>

  <div class="content" id="content">
    <div class="loading" id="loading-state">
      <div class="spinner"></div>
      <div>Loading your sessions...</div>
    </div>
  </div>

<script>
  const API = window.location.origin;
  const contentEl = document.getElementById("content");

  // Get userId from localStorage (same as chat page)
  const userId = localStorage.getItem("blucare_user_id");
  const storedName = localStorage.getItem("blucare_user_name");

  if (!userId || !storedName) {
    contentEl.innerHTML = `
      <div class="empty-state">
        <h2>Not logged in</h2>
        <p>Please login to view your session history.</p>
        <a href="/">Login</a>
      </div>
    `;
  } else {
    loadSessions();
  }

  async function loadSessions() {
    try {
      const res = await fetch(`${API}/api/sessions?user_id=${encodeURIComponent(userId)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const sessions = data.sessions || [];

      if (sessions.length === 0) {
        contentEl.innerHTML = `
          <div class="empty-state">
            <h2>No sessions yet</h2>
            <p>Your consultation history will appear here after your first chat.</p>
            <a href="/">Start a Consultation</a>
          </div>
        `;
        return;
      }

      renderSessionList(sessions);
    } catch (err) {
      console.error(err);
      contentEl.innerHTML = `<div class="error-msg">Failed to load sessions: ${escapeHtml(err.message)}</div>`;
    }
  }

  function renderSessionList(sessions) {
    const listHtml = sessions.map(s => {
      const isCompleted = s.phase === "completed";
      const iconClass = isCompleted ? "completed" : "active";
      const iconText = isCompleted ? "ok" : "...";
      const phaseClass = (s.phase || "greeting").replace(/\s+/g, "_");
      const phaseLabel = {
        greeting: "Greeting",
        gathering: "Gathering",
        awaiting_choice: "Awaiting Choice",
        completed: "Completed",
        diagnosis: "Diagnosis",
      }[s.phase] || s.phase || "Unknown";

      const disease = s.top_disease || "No diagnosis yet";
      const date = formatDate(s.created_at);
      const msgCount = s.message_count || 0;
      const symptomCount = s.symptom_count || 0;

      return `
        <div class="session-card" onclick="openSession('${s.session_id}')">
          <div class="sc-icon ${iconClass}">${iconText}</div>
          <div class="sc-info">
            <div class="sc-title">${escapeHtml(disease)}</div>
            <div class="sc-meta">
              <span>${date}</span>
              <span>${msgCount} messages</span>
              ${symptomCount > 0 ? `<span>${symptomCount} symptoms</span>` : ""}
            </div>
          </div>
          <span class="sc-phase ${phaseClass}">${phaseLabel}</span>
        </div>
      `;
    }).join("");

    contentEl.innerHTML = `
      <div class="session-list" id="session-list">${listHtml}</div>
      <div class="session-detail" id="session-detail"></div>
    `;
  }

  async function openSession(sessionId) {
    const listEl = document.getElementById("session-list");
    const detailEl = document.getElementById("session-detail");

    listEl.style.display = "none";
    detailEl.className = "session-detail active";
    detailEl.innerHTML = `<div class="loading"><div class="spinner"></div><div>Loading session...</div></div>`;

    try {
      const res = await fetch(`${API}/api/sessions/${sessionId}?user_id=${encodeURIComponent(userId)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const session = await res.json();

      renderSessionDetail(session, detailEl, listEl);
      // reset scroll to top of detail container to avoid carry-over
      const msgsEl = detailEl.querySelector('.read-only-messages');
      if (msgsEl) msgsEl.scrollTop = 0;
      // Defensive: ensure top header back link still present
      ensureHeaderBackLink();
      // Ensure header back link exists (defensive restore)
      ensureHeaderBackLink();
    } catch (err) {
      console.error(err);
      detailEl.innerHTML = `
        <div class="error-msg">Failed to load session: ${escapeHtml(err.message)}</div>
        <button class="detail-back-btn" style="margin-top: 1rem;" onclick="closeDetail()">Back to list</button>
      `;
    }
  }

  function renderSessionDetail(session, detailEl, listEl) {
    const messages = session.previous_messages || [];
    const date = formatDate(session.created_at);
    const disease = session.diagnosis_summary
      ? session.diagnosis_summary.substring(0, 80) + (session.diagnosis_summary.length > 80 ? "..." : "")
      : "Consultation";

    let msgsHtml = messages.map(m => {
      const role = m.role === "user" ? "user" : "bot";
      return `<div class="ro-msg ${role}">${role === "bot" ? renderMarkdown(m.content || "") : escapeHtml(m.content || "")}</div>`;
    }).join("");

    if (messages.length === 0) {
      msgsHtml = `<div style="text-align:center; color:#64748b; padding:2rem;">No messages in this session.</div>`;
    }

    detailEl.innerHTML = `
      <div class="detail-header">
        <button class="detail-back-btn" onclick="closeDetail()">Back</button>
        <span class="detail-title">${escapeHtml(disease)}</span>
        <span class="detail-date">${date}</span>
      </div>
      <div class="read-only-messages">${msgsHtml}</div>
      <div class="read-only-notice">This is a read-only view of a past session.</div>
    `;
    // reset scroll to top of detail container to avoid carry-over
    const msgs = detailEl.querySelector('.read-only-messages');
    if (msgs) msgs.scrollTop = 0;
    // Defensive: ensure top header back link still present
    ensureHeaderBackLink();
  }

  function closeDetail() {
    const listEl = document.getElementById("session-list");
    const detailEl = document.getElementById("session-detail");
    if (listEl) listEl.style.display = "flex";
    if (detailEl) { detailEl.className = "session-detail"; detailEl.innerHTML = ""; }
  }

  // Ensure the top-page Back to Chat link exists (defensive)
  function ensureHeaderBackLink() {
    const header = document.querySelector('.page-header');
    if (!header) return;
    let back = header.querySelector('.back-btn[href="/"]');
    if (!back) {
      back = document.createElement('a');
      back.className = 'back-btn';
      back.href = '/';
      back.textContent = 'Back to Chat';
      header.appendChild(back);
    }
  }

  // ─── Helpers ────────────────────────────────────────

  function formatDate(dateStr) {
    if (!dateStr) return "Unknown date";
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString("en-US", {
        month: "short", day: "numeric", year: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
    } catch { return dateStr; }
  }

  function escapeHtml(t) {
    if (!t) return "";
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderMarkdown(text) {
    if (!text) return "";
    let html = escapeHtml(text);

    html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
    html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
    html = html.replace(/^## (.+)$/gm,  "<h2>$1</h2>");
    html = html.replace(/^# (.+)$/gm,   "<h1>$1</h1>");
    html = html.replace(/^-{3,}$/gm, "<hr>");
    html = html.replace(/^[*\-] (.+)$/gm, "<li>$1</li>");
    html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    html = html.replace(/^\d+\.\s(.+)$/gm, "<li>$1</li>");
    html = html.replace(/`(.+?)`/g, "<code>$1</code>");
    html = html.replace(/\n/g, "<br>");
    html = html.replace(/<\/h[123]><br>/g, m => m.replace(/<br>/, ""));
    html = html.replace(/<hr><br>/g, "<hr>");
    html = html.replace(/<\/ul><br>/g, "</ul>");

    return html;
  }
</script>

</body>
</html>
